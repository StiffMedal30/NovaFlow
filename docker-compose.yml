services:
  postgres:
    image: postgres:15
    container_name: postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    networks:
      - app-network
    volumes:
      - ./init:/docker-entrypoint-initdb.d
      - postgres_data:/var/lib/postgresql/data
    restart: always

  pgadmin:
    image: dpage/pgadmin4
    container_name: pgadmin
    depends_on:
      - postgres
    ports:
      - "8090:80"
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@local.com
      PGADMIN_DEFAULT_PASSWORD: password
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    networks:
      - app-network
    restart: always

  eureka:
    image: steeltoeoss/eureka-server
    container_name: eureka-server
    ports:
      - "8761:8761"
    environment:
      EUREKA_CLIENT_REGISTERWITH_EUREKA: "false"
      EUREKA_CLIENT_FETCHREGISTRY: "false"
      EUREKA_SERVER_ENABLESELFPRESERVATION: "false"
      SPRING_APPLICATION_NAME: "discovery-server"
    networks:
      - app-network
    restart: always

  config-server:
    image: config-server
    container_name: config-server
    depends_on:
      - eureka
    ports:
      - "7090:7090"
    volumes:
      - ${HOME}/.ssh:/root/.ssh   # Mount host SSH keys
    environment:
      - GIT_SSH_COMMAND=ssh -i /root/.ssh/bitbucket_rsa -o StrictHostKeyChecking=yes -o UserKnownHostsFile=/root/.ssh/known_hosts
    networks:
      - app-network
    restart: always

  user-service:
    image: user-service
    container_name: user-service
    depends_on:
      - eureka
      - config-server
      - postgres
    ports:
      - "7010:7010"
    environment:
      - DB_USERNAME=${DB_USERNAME}
      - DB_PASSWORD=${DB_PASSWORD}
      - EMAIL_HOST=${EMAIL_HOST}
      - EMAIL_PORT=${EMAIL_PORT}
      - EMAIL_USERNAME=${EMAIL_USERNAME}
      - EMAIL_PASSWORD=${EMAIL_PASSWORD}
      - EMAIL_PROTOCOL=${EMAIL_PROTOCOL}
    networks:
      - app-network
    restart: always

  idea-service:
    image: idea-service
    container_name: idea-service
    depends_on:
      - eureka
      - config-server
      - postgres
    ports:
      - "7020:7020"
    environment:
      - DB_USERNAME=${DB_USERNAME}
      - DB_PASSWORD=${DB_PASSWORD}
    networks:
      - app-network
    restart: always

  ai-service:
    image: ai-service
    container_name: ai-service
    depends_on:
      - eureka
      - config-server
      - postgres
    ports:
      - "7030:7030"
    environment:
      - DB_USERNAME=${DB_USERNAME}
      - DB_PASSWORD=${DB_PASSWORD}
    networks:
      - app-network
    restart: always

  api-gateway:
    image: api-gateway
    container_name: api-gateway
    depends_on:
      - eureka
      - config-server
    ports:
      - "8081:8080"
    networks:
      - app-network
    restart: always

  novafront:
    image: novafront
    container_name: novafront
    ports:
      - "3000:80"
    networks:
      - app-network
    restart: always

networks:
  app-network:
    driver: bridge

volumes:
  postgres_data:
  pgadmin_data:


