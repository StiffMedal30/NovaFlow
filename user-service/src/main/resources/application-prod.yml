server:
  port: ${SERVER_PORT:8082}

spring:
  application:
    name: user-service

  config:
    import: "configserver:http://config-server:7090/"  # Pull config from config server
    label: develop

  cloud:
    config:
      uri: http://config-server:7090  # Location of config server
      fail-fast: true
      retry:
        max-attempts: 10
        initial-interval: 2000
        multiplier: 1.5
        max-interval: 10000

  liquibase:
    drop-first: false

  jpa:
    show-sql: true

  rabbitmq:
    host: ${RABBITMQ_HOST:rabbitmq}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USERNAME}
    password: ${RABBITMQ_PASSWORD}

app:
  account-activation:
    token-ttl: 24h
  messaging:
    email:
      exchange: novaflow.notifications
      queue: novaflow.email.delivery
      routing-key: email.send
      dead-letter-exchange: novaflow.notifications.dlx
      dead-letter-queue: novaflow.email.delivery.dlq
      dead-letter-routing-key: email.failed

novaflow:
  internal-service-key: ${INTERNAL_SERVICE_KEY}

