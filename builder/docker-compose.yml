services:
  postgres:
    image: postgres:15
    container_name: postgres
    environment:
      POSTGRES_USER: "sa"
      POSTGRES_PASSWORD: "StiffMedal30"
    ports:
      - "5432:5432"
    networks:
      - app-network
    volumes:
      - ./init:/docker-entrypoint-initdb.d
      - postgres_data:/var/lib/postgresql/data
    restart: always

  pgadmin:
    image: dpage/pgadmin4
    container_name: pgadmin
    depends_on:
      - postgres
    ports:
      - "8090:80"
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@local.com
      PGADMIN_DEFAULT_PASSWORD: password
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    networks:
      - app-network
    restart: always

  rabbitmq:
    image: rabbitmq:3.13-management
    container_name: rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USERNAME}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD}
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 6
    restart: always

  eureka:
    image: steeltoeoss/eureka-server
    container_name: eureka-server
    ports:
      - "8761:8761"
    environment:
      EUREKA_CLIENT_REGISTERWITH_EUREKA: "false"
      EUREKA_CLIENT_FETCHREGISTRY: "false"
      EUREKA_SERVER_ENABLESELFPRESERVATION: "false"
      SPRING_APPLICATION_NAME: "discovery-server"
    networks:
      - app-network
    restart: always

  config-server:
    image: config-server
    container_name: config-server
    depends_on:
      - eureka
    ports:
      - "7090:7090"
    volumes:
      - ../common-config:/config:ro
      - ${HOME}/.ssh:/root/.ssh   # Mount host SSH keys
    environment:
      - SPRING_PROFILES_ACTIVE=native
      - SPRING_CLOUD_CONFIG_SERVER_NATIVE_SEARCH_LOCATIONS=file:/config/{application},file:/config
      - GIT_SSH_COMMAND=ssh -i /root/.ssh/bitbucket_rsa -o StrictHostKeyChecking=yes -o UserKnownHostsFile=/root/.ssh/known_hosts
      - JWT_SECRET=${JWT_SECRET}
      - JWT_EXPIRATION=${JWT_EXPIRATION:-3600000}
    networks:
      - app-network
    restart: always

  user-service:
    image: user-service
    container_name: user-service
    depends_on:
      - eureka
      - config-server
      - postgres
      - rabbitmq
    ports:
      - "7010:8082"
    environment:
      - DB_USERNAME=${DB_USERNAME}
      - DB_PASSWORD=${DB_PASSWORD}
      - RABBITMQ_HOST=rabbitmq
      - RABBITMQ_PORT=5672
      - RABBITMQ_USERNAME=${RABBITMQ_USERNAME}
      - RABBITMQ_PASSWORD=${RABBITMQ_PASSWORD}
      - JWT_SECRET=${JWT_SECRET}
      - JWT_EXPIRATION=${JWT_EXPIRATION:-3600000}
      - INTERNAL_SERVICE_KEY=${INTERNAL_SERVICE_KEY}
      - SPRING_PROFILES_ACTIVE=prod
      - SPRING_CONFIG_IMPORT=configserver:http://config-server:7090/
      - SPRING_CLOUD_CONFIG_URI=http://config-server:7090
    networks:
      - app-network
    restart: always

  email-service:
    image: email-service
    container_name: email-service
    depends_on:
      - eureka
      - config-server
      - rabbitmq
    ports:
      - "8050:8050"
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - SPRING_CONFIG_IMPORT=configserver:http://config-server:7090/
      - SPRING_CLOUD_CONFIG_URI=http://config-server:7090
      - RABBITMQ_HOST=rabbitmq
      - RABBITMQ_PORT=5672
      - RABBITMQ_USERNAME=${RABBITMQ_USERNAME}
      - RABBITMQ_PASSWORD=${RABBITMQ_PASSWORD}
      - EMAIL_HOST=${EMAIL_HOST}
      - EMAIL_PORT=${EMAIL_PORT}
      - EMAIL_USERNAME=${EMAIL_USERNAME}
      - EMAIL_PASSWORD=${EMAIL_PASSWORD}
      - EMAIL_SMTP_AUTH=${EMAIL_SMTP_AUTH:-true}
      - EMAIL_STARTTLS=${EMAIL_STARTTLS:-true}
      - EMAIL_FROM_ADDRESS=${EMAIL_FROM_ADDRESS}
      - EMAIL_FROM_NAME=${EMAIL_FROM_NAME:-NovaFlow}
      - PUBLIC_API_URL=${PUBLIC_API_URL}
    networks:
      - app-network
    restart: always

  idea-service:
    image: idea-service
    container_name: idea-service
    depends_on:
      - eureka
      - config-server
      - postgres
    ports:
      - "7020:8083"
    environment:
      - DB_USERNAME=${DB_USERNAME}
      - DB_PASSWORD=${DB_PASSWORD}
      - SPRING_PROFILES_ACTIVE=prod
    networks:
      - app-network
    restart: always

  ai-service:
    image: ai-service
    container_name: ai-service
    depends_on:
      - eureka
      - config-server
      - postgres
    ports:
      - "7030:8084"
    env_file:
      - ../ai-service/.env
    environment:
      - DB_USERNAME=${DB_USERNAME}
      - DB_PASSWORD=${DB_PASSWORD}
      - SPRING_PROFILES_ACTIVE=prod
    networks:
      - app-network
    restart: always

  api-gateway:
    image: api-gateway
    container_name: api-gateway
    depends_on:
      - eureka
      - config-server
    ports:
      - "8081:8081"
    environment:
      - JWT_SECRET=${JWT_SECRET}
      - JWT_EXPIRATION=${JWT_EXPIRATION:-3600000}
      - INTERNAL_SERVICE_KEY=${INTERNAL_SERVICE_KEY}
      - GOOGLE_OAUTH_ENABLED=${GOOGLE_OAUTH_ENABLED:-false}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
      - FRONTEND_BASE_URL=${FRONTEND_BASE_URL}
      - SPRING_PROFILES_ACTIVE=prod
    networks:
      - app-network
    restart: always

  chat-service:
    image: chat-service
    container_name: chat-service
    depends_on:
      - eureka
      - config-server
    ports:
      - "8085:8085"
    environment:
      - SPRING_PROFILES_ACTIVE=prod
    networks:
      - app-network
    restart: always

  novafront:
    image: novafront
    container_name: novafront
    ports:
      - "3000:80"
    networks:
      - app-network
    restart: always

  loki:
    image: grafana/loki:2.9.8
    ports:
      - "3100:3100"
    volumes:
      - ./loki/local-config.yml:/etc/loki/local-config.yml
      - loki-data:/loki
    command: -config.file=/etc/loki/local-config.yml

  promtail:
    image: grafana/promtail:2.9.8
    volumes:
      - ./promtail/config.yml:/etc/promtail/config.yml
      - /var/log:/var/log
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock
    command: -config.file=/etc/promtail/config.yml

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3001:3000"

networks:
  app-network:
    driver: bridge

volumes:
  postgres_data:
  pgadmin_data:
  loki-data:
  rabbitmq_data:


