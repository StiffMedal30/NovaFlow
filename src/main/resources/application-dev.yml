server:
  port: 8083

spring:
  application:
    name: idea-service
  profiles:
    active: dev   # <-- this makes sure it fetches idea-service-dev.yml + application

  cloud:
    config:
      uri: http://localhost:7090  # Location of config server
      fail-fast: true
      retry:
        max-attempts: 10
        initial-interval: 2000
        multiplier: 1.5
        max-interval: 10000

  liquibase:
    drop-first: true

  jpa:
    show-sql: true
