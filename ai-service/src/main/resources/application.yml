server:
  port: ${SERVER_PORT:8084}

spring:
  config:
    import:
      - optional:file:.env[.properties]
      - optional:file:../.env[.properties]
  application:
    name: ai-service
  profiles:
    active: dev   # <-- this makes sure it fetches ai-service-dev.yml + application-dev.yml
  ai:
    ollama:
      base-url: http://localhost:11434

  cloud:
    config:
      uri: http://localhost:7090  # Location of config server
      fail-fast: true
      retry:
        max-attempts: 10
        initial-interval: 2000
        multiplier: 1.5
        max-interval: 10000

openai:
  api-key: ${OPENAI_API_KEY:}
  base-url: ${OPENAI_BASE_URL:https://api.openai.com/v1}
  refinement-model: ${OPENAI_REFINEMENT_MODEL:${OPENAI_MODEL:gpt-5.2}}
  transcription-model: ${OPENAI_TRANSCRIPTION_MODEL:gpt-4o-mini-transcribe}

  liquibase:
    drop-first: false

  jpa:
    show-sql: true
