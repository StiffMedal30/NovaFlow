spring:
  rabbitmq:
    host: ${RABBITMQ_HOST:rabbitmq}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USERNAME}
    password: ${RABBITMQ_PASSWORD}
  mail:
    host: ${EMAIL_HOST}
    port: ${EMAIL_PORT:587}
    username: ${EMAIL_USERNAME}
    password: ${EMAIL_PASSWORD}
    properties:
      mail.smtp.auth: ${EMAIL_SMTP_AUTH:true}
      mail.smtp.starttls.enable: ${EMAIL_STARTTLS:true}

app:
  mail:
    from-address: ${EMAIL_FROM_ADDRESS}
    from-name: ${EMAIL_FROM_NAME:NovaFlow}
    account-activation-url: ${PUBLIC_API_URL}/api-gateway/api/account/activate
    reset-password-url: ${PUBLIC_API_URL}/api-gateway/api/reset/password
    collaborator-invite-url: ${PUBLIC_API_URL}/api-gateway/api/invite/collaborator
    base-redirect-url: ${PUBLIC_API_URL}/api/link?t=
    activate-account-subject: Verify your NovaFlow account
    activate-account-message-body: |
      <!doctype html>
      <html lang="en">
        <body style="margin:0;padding:0;background:#100d14;color:#fffffe;font-family:'Didact Gothic',Arial,Helvetica,sans-serif;">
          <table role="presentation" width="100%" cellspacing="0" cellpadding="0" border="0" style="background:#100d14;">
            <tr>
              <td align="center" style="padding:40px 16px;">
                <table role="presentation" width="100%" cellspacing="0" cellpadding="0" border="0" style="max-width:560px;background:#17151b;border:1px solid #2b2532;border-radius:8px;">
                  <tr>
                    <td style="padding:32px;">
                      <div style="font-size:28px;line-height:1.2;color:#fffffe;">NovaFlow</div>
                      <div style="width:48px;height:3px;margin:18px 0 28px;background:#908df7;"></div>
                      <h1 style="margin:0 0 16px;font-size:24px;font-weight:400;line-height:1.3;color:#fffffe;">Verify your account</h1>
                      <p style="margin:0 0 24px;font-size:16px;line-height:1.7;color:#c9c5cf;">
                        Welcome to NovaFlow. Your account has been created and is waiting for verification.
                      </p>
                      <table role="presentation" cellspacing="0" cellpadding="0" border="0">
                        <tr>
                          <td style="border-radius:6px;background:#908df7;">
                            <a href="%s" style="display:inline-block;padding:13px 22px;color:#100d14;font-size:16px;font-weight:700;text-decoration:none;">Verify email address</a>
                          </td>
                        </tr>
                      </table>
                      <p style="margin:24px 0 0;font-size:14px;line-height:1.7;color:#9d98a6;">
                        This link expires after 24 hours and can only be used once.
                      </p>
                      <p style="margin:20px 0 0;padding-top:20px;border-top:1px solid #2b2532;font-size:13px;line-height:1.6;color:#77717f;">
                        If you did not create a NovaFlow account, you can safely ignore this email.
                      </p>
                    </td>
                  </tr>
                </table>
              </td>
            </tr>
          </table>
        </body>
      </html>
    reset-password-subject: Reset your NovaFlow password
    reset-password-message-body: |
      <html>
        <body>
          <h2>NovaFlow</h2>
          <p>Your password has been reset. Please click the link below to confirm that this was you:</p>
          <a href="%s" style="display:inline-block;padding:10px 20px;background-color:#4CAF50;color:white;text-decoration:none;border-radius:5px;">Confirm Reset</a>
          <p>If you didn't request a password reset, you can safely ignore this email.</p>
        </body>
      </html>
    invitation-subject: NovaFlow account invitation
    invitation-message-body: |
      <html>
        <body>
          <h2>NovaFlow</h2>
          <p>You have been invited to join a project. Please click the link below to accept the invitation:</p>
          <a href="%s" style="display:inline-block;padding:10px 20px;background-color:#4CAF50;color:white;text-decoration:none;border-radius:5px;">Accept Invitation</a>
          <p>If you are not aware of this, you can safely ignore it.</p>
          <p>This email will expire in 24 hours.</p>
        </body>
      </html>
