databaseChangeLog:
  - changeSet:
      id: 1
      author: christiaan Dotze
      changes:
        - createTable:
            tableName: idea
            columns:
              - column:
                  name: id
                  type: bigint
                  autoIncrement: true
                  constraints:
                    nullable: false
                    primaryKey: true
              - column:
                  name: created_at
                  type: timestamp
              - column:
                  name: created_by
                  type: varchar(255)
              - column:
                  name: modified_at
                  type: timestamp
              - column:
                  name: modified_by
                  type: varchar(255)
              - column:
                  name: title
                  type: varchar(255)
              - column:
                  name: description
                  type: text